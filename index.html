<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Power User — Interactive board</title>
<style>
  :root{
    --bg:#0f1420;--bg2:#161d2e;--card:#1b2438;--card2:#212c45;
    --ink:#eef2fb;--muted:#9aa7c2;--line:#2b3652;
    --accent:#4f7cff;--accent2:#22c3a6;--warn:#ff6b6b;--gold:#ffc64b;
    --power:#6ea8ff;--radius:18px;--shadow:0 18px 40px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI",Roboto,-apple-system,system-ui,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 15% -10%, #1d2740 0%, var(--bg) 55%) fixed;
    color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:var(--accent)}
  header.board-head{padding:34px 30px 10px;max-width:1280px;margin:0 auto;position:relative}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--accent2);font-weight:700;border:1px solid var(--line);
    border-radius:999px;padding:6px 14px;background:rgba(34,195,166,.08)}
  h1.title{font-size:clamp(28px,4.4vw,52px);line-height:1.05;margin:16px 0 6px;font-weight:800;letter-spacing:-.02em}
  .lead{color:var(--muted);max-width:760px;font-size:17.5px;line-height:1.55}
  .langtog{position:absolute;top:34px;right:30px;display:flex;border:1px solid var(--line);
    border-radius:999px;overflow:hidden;background:var(--card)}
  .langtog button{border:0;background:transparent;color:var(--muted);padding:8px 16px;font-size:13px;
    font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.04em}
  .langtog button.on{background:var(--ink);color:#0f1420}
  .langtog button:not(.on):hover{color:var(--ink)}
  .toolbar{max-width:1280px;margin:22px auto 0;padding:0 30px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .chip{cursor:pointer;user-select:none;border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:9px 16px;border-radius:999px;font-size:13.5px;font-weight:600;transition:.18s;display:inline-flex;align-items:center;gap:8px}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .chip[data-theme="ctx"] .dot{background:var(--accent)}
  .chip[data-theme="know"] .dot{background:var(--gold)}
  .chip[data-theme="tools"] .dot{background:var(--accent2)}
  .chip:hover{color:var(--ink);border-color:#3b496e}
  .chip.active{color:#0f1420;background:var(--ink);border-color:var(--ink)}
  .counter{margin-left:auto;color:var(--muted);font-size:13px}
  .board{max-width:1280px;margin:22px auto 80px;padding:0 30px;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;align-items:start}
  .cardx{position:relative;background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line);border-radius:var(--radius);padding:20px 20px 18px;cursor:pointer;
    overflow:hidden;transition:transform .18s ease, border-color .18s, box-shadow .18s;min-height:172px;display:flex;flex-direction:column}
  .cardx::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--accent)}
  .cardx[data-theme="know"]::before{background:var(--gold)}
  .cardx[data-theme="tools"]::before{background:var(--accent2)}
  .cardx:hover{transform:translateY(-4px);border-color:#41527d;box-shadow:var(--shadow)}
  .cardx .num{position:absolute;top:14px;right:16px;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .cardx .ic{font-size:26px;margin-bottom:12px}
  .cardx h3{margin:0 0 6px;font-size:20.5px;font-weight:750;line-height:1.2;padding-right:20px}
  .cardx .sub{color:var(--muted);font-size:14.5px;line-height:1.5;flex:1}
  .cardx .tag{margin-top:14px;font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);display:inline-flex;align-items:center;gap:6px}
  .cardx[data-theme="know"] .tag{color:var(--gold)}
  .cardx[data-theme="tools"] .tag{color:var(--accent2)}
  .cardx.hidden{display:none}
  .overlay{position:fixed;inset:0;background:rgba(6,9,16,.72);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{width:min(880px,100%);background:var(--bg2);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow);padding:0;overflow:hidden;animation:pop .22s ease}
  @keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:24px 26px 18px;border-bottom:1px solid var(--line);position:relative;
    background:linear-gradient(180deg,rgba(79,124,255,.10),transparent)}
  .modal-head .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2);font-weight:700}
  .modal-head h2{margin:8px 0 2px;font-size:29px;font-weight:800;letter-spacing:-.01em}
  .close{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:19px;cursor:pointer;line-height:1;transition:.15s}
  .close:hover{background:var(--warn);border-color:var(--warn);color:#fff}
  .modal-body{padding:24px 26px 30px}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.compare{grid-template-columns:1fr}}
  .flip{perspective:1200px;height:250px;cursor:pointer}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:18px;
    display:flex;flex-direction:column;border:1px solid var(--line)}
  .flip .face{padding-bottom:42px}
  .face .lbl{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
  .face .big{font-size:17.5px;line-height:1.4;font-weight:600}
  .face .ex{margin-top:auto;font-size:15.5px;color:var(--muted);line-height:1.45;font-style:italic}
  .face .hint{position:absolute;bottom:16px;right:16px;font-size:13px;font-weight:700;color:var(--power);opacity:.95}
  .front.novice{background:rgba(255,198,75,.09);border-color:rgba(255,198,75,.35)}
  .front.novice .lbl{color:var(--gold)}
  .front.novice .hint{color:var(--gold)}
  .front.power{background:rgba(110,168,255,.10);border-color:rgba(110,168,255,.35)}
  .front.power .lbl{color:var(--power)}
  .back{transform:rotateY(180deg);background:var(--card2)}
  .back .lbl{color:var(--accent2)}
  .back .hint{color:var(--accent2)}
  .flip-tip{text-align:center;color:var(--muted);font-size:14px;font-weight:600;margin:2px 0 16px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:8px 14px;
    border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:600;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .pane{display:none;animation:fade .25s}
  .pane.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .qrow{display:flex;align-items:center;gap:12px;justify-content:space-between;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap}
  .qrow .q{font-size:15px;flex:1;min-width:180px}
  .qbtns{display:flex;gap:8px}
  .qbtn{border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:10px;
    padding:8px 12px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s;display:flex;align-items:center;gap:6px}
  .qbtn:hover{border-color:var(--accent)}
  .qbtn.correct{background:rgba(34,195,166,.18);border-color:var(--accent2);color:#7ff0d8}
  .qbtn.wrong{background:rgba(255,107,107,.16);border-color:var(--warn);color:#ffb3b3}
  .qfeed{width:100%;font-size:13px;color:var(--muted);margin-top:6px;display:none}
  .qrow.answered .qfeed{display:block}
  .quiz-score{margin-top:12px;font-weight:700;color:var(--accent2)}
  .note{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);
    border-radius:12px;padding:16px 18px;margin:14px 0;line-height:1.6;font-size:16.5px}
  .note b{color:var(--ink)}
  ul.clean{list-style:none;padding:0;margin:12px 0}
  ul.clean li{padding:11px 0 11px 28px;position:relative;border-bottom:1px dashed var(--line);line-height:1.55;font-size:16px}
  ul.clean li:last-child{border-bottom:0}
  ul.clean li::before{content:"→";position:absolute;left:2px;color:var(--accent2);font-weight:800}
  .axis{position:relative;margin:26px 6px;height:10px;background:linear-gradient(90deg,#4f7cff,#ff6b6b);border-radius:6px}
  .axis .pt{position:absolute;top:-6px;width:20px;height:20px;border-radius:50%;background:var(--bg2);
    border:2px solid var(--accent);transform:translateX(-50%);cursor:pointer;transition:.15s}
  .axis .pt:hover{transform:translateX(-50%) scale(1.25);box-shadow:0 0 0 6px rgba(79,124,255,.15)}
  .axis-labels{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:14px}
  .axis-out{min-height:52px;margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.5}
  .flow{display:flex;flex-direction:column;gap:0}
  .step{display:flex;gap:14px;align-items:flex-start;position:relative;padding:0 0 22px}
  .step:last-child{padding-bottom:0}
  .step .bullet{width:38px;height:38px;flex:0 0 38px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-weight:800;background:var(--accent);color:#fff;z-index:1}
  .step:not(:last-child)::before{content:"";position:absolute;left:18px;top:38px;bottom:0;width:2px;background:var(--line)}
  .step .body{padding-top:5px}
  .step .body h4{margin:0 0 4px;font-size:16px}
  .step .body p{margin:0;color:var(--muted);font-size:15px;line-height:1.55}
  .step .body .model{display:inline-block;font-size:12px;font-weight:700;color:var(--accent2);
    background:rgba(34,195,166,.1);border:1px solid rgba(34,195,166,.3);padding:2px 9px;border-radius:6px;margin-bottom:6px}
  .pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:3px 10px;font-size:13px;margin:3px 4px 0 0}
  .plink{display:inline-flex;align-items:center;gap:8px;margin-top:6px;background:var(--accent);color:#fff;
    text-decoration:none;font-weight:700;font-size:14.5px;padding:11px 18px;border-radius:12px;transition:.15s}
  .plink:hover{background:#6a92ff}
  .reveal{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:10px 0}
  .reveal summary{cursor:pointer;padding:13px 16px;font-weight:650;font-size:14.5px;list-style:none;
    display:flex;justify-content:space-between;align-items:center;background:var(--card)}
  .reveal summary::after{content:"+";font-size:18px;color:var(--accent2)}
  .reveal[open] summary::after{content:"–"}
  .reveal .rc{padding:14px 16px;font-size:14px;line-height:1.55;color:var(--muted)}
  .subhead{font-weight:700;font-size:15px;margin:20px 0 10px}
  .chip[data-theme="vibe"] .dot{background:#a78bfa}
  .chip[data-theme="agents"] .dot{background:#ff8a5c}
  .cardx[data-theme="vibe"]::before{background:#a78bfa}
  .cardx[data-theme="agents"]::before{background:#ff8a5c}
  .cardx[data-theme="vibe"] .tag{color:#c4b5fd}
  .cardx[data-theme="agents"] .tag{color:#ffb094}
  .cmp3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}
  @media(max-width:640px){.cmp3{grid-template-columns:1fr}}
  .cmpcol{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .cmpcol .ic{font-size:26px}
  .cmpcol h4{margin:6px 0 6px;font-size:15px}
  .cmpcol p{margin:0;color:var(--muted);font-size:14.5px;line-height:1.5}
  .bldr{display:grid;gap:12px;margin:8px 0 16px}
  .bldr label{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px}
  .bldr select{width:100%;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit}
  .toolgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
  .toolgrid label{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--ink);font-size:13.5px;font-weight:600;cursor:pointer;margin:0}
  .toolgrid input{accent-color:var(--accent2)}
  .agentcard{background:var(--card2);border:1px solid var(--line);border-left:4px solid #ff8a5c;border-radius:12px;padding:16px 18px;font-size:14.5px;line-height:1.7}
  .maflow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:14px 0}
  .manode{display:inline-flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 10px;min-width:96px;text-align:center;font-size:12.5px;transition:.2s}
  .manode.on{border-color:#ff8a5c;background:rgba(255,138,92,.16);box-shadow:0 0 0 4px rgba(255,138,92,.10)}
  .maarrow{color:var(--muted);font-size:18px}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}
  .btn:hover{background:#6a92ff}
  .checkitem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:8px;cursor:pointer;font-size:14px}
  .checkitem input{accent-color:var(--accent2);width:18px;height:18px}
  .promptbubble{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 16px;font-size:15.5px;margin:10px 0}
  .codeblk{background:#0d1220;border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow-x:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.55;color:#cfe0ff;white-space:pre;margin:0}
  .tplrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tplbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;padding:10px 14px;font-size:14.5px;font-weight:600;cursor:pointer;transition:.15s}
  .tplbtn:hover{border-color:#ff8a5c}
  .tplbtn.on{background:rgba(255,138,92,.16);border-color:#ff8a5c}
  .tplvis{width:56px;height:56px;flex:0 0 56px;border-radius:14px;background:rgba(255,138,92,.14);border:1px solid rgba(255,138,92,.35);display:flex;align-items:center;justify-content:center;font-size:30px}
  .rowimg{display:flex;gap:20px;align-items:flex-start}
  .rowimg-body{flex:1;min-width:0}
  .rowimg-pic{flex:0 0 250px;width:250px;height:auto;border:1px solid var(--line);border-radius:14px;position:sticky;top:20px}
  @media(max-width:760px){.rowimg{flex-direction:column}.rowimg-pic{width:100%;flex:auto;position:static}}

  .storylayout{display:flex;align-items:flex-start}
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:62px;overflow:hidden;padding:0;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:14px;background:rgba(13,18,30,.97);z-index:50;transition:width .25s ease}
  .sidebar:hover{width:300px;overflow-y:auto;padding:26px 22px;box-shadow:18px 0 40px rgba(0,0,0,.35)}
  .railhint{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:18px;color:var(--muted)}
  .railhint .rh-ic{font-size:22px}
  .railhint .rh-txt{writing-mode:vertical-rl;font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;opacity:.7}
  .sidebar:hover .railhint{display:none}
  .sidebar>:not(.railhint){opacity:0;transition:opacity .12s}
  .sidebar:hover>:not(.railhint){opacity:1}
  .sidebar .langtog{position:static;align-self:flex-start}
  .story-title{font-size:25px;font-weight:800;line-height:1.12;letter-spacing:-.02em;margin:2px 0}
  .chapnav{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .chapbtn{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:12px;padding:11px 13px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;text-align:left;width:100%}
  .chapbtn:hover{color:var(--ink);border-color:#3b496e}
  .chapbtn.on{background:var(--ink);color:#0f1420;border-color:var(--ink)}
  .chapbtn .cdot{width:11px;height:11px;border-radius:50%;flex:0 0 11px}
  .maincol{flex:1;min-width:0;margin-left:62px;padding:26px 96px 90px 112px}
  .stepbar{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .chapLabel{font-weight:700;font-size:14px;color:var(--accent2);white-space:nowrap}
  .chapprog-track{flex:1;height:7px;background:var(--line);border-radius:6px;overflow:hidden}
  #chapProg{display:block;height:100%;width:0;background:var(--accent);border-radius:6px;transition:width .3s}
  .stepcount{font-size:13px;color:var(--muted);white-space:nowrap}
  .sidebar .stepbar{flex-direction:column;align-items:stretch;gap:8px;margin-top:2px}
  .stage{position:relative;overflow:hidden;min-height:320px}
  .panel{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px;padding:26px 30px 34px;box-shadow:var(--shadow)}
  .p-head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .p-badge{width:62px;height:62px;flex:0 0 62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(255,255,255,.05);border:1.5px solid var(--line)}
  .p-eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2);font-weight:700}
  .p-title{font-size:30px;font-weight:800;margin:4px 0 0;letter-spacing:-.01em;line-height:1.1}
  .in-right{animation:slideR .35s ease}
  .in-left{animation:slideL .35s ease}
  @keyframes slideR{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:none}}
  @keyframes slideL{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:none}}
  .navbtn{position:fixed;top:50%;transform:translateY(-50%);width:58px;height:58px;border-radius:50%;border:1px solid var(--line);background:var(--card2);color:var(--ink);font-size:24px;cursor:pointer;transition:.15s;z-index:40;box-shadow:var(--shadow)}
  .navbtn:hover:not(:disabled){background:var(--accent);border-color:var(--accent);color:#fff}
  .navbtn:disabled{opacity:.3;cursor:default}
  #prevBtn{left:78px}
  #nextBtn{right:26px}
  @media(max-width:900px){
    .storylayout{flex-direction:column}
    .sidebar{position:static;width:auto;height:auto;overflow:visible;padding:18px 16px;border-right:0;border-bottom:1px solid var(--line)}
    .sidebar>:not(.railhint){opacity:1}
    .railhint{display:none}
    .chapnav{flex-direction:row;flex-wrap:wrap}
    .chapbtn{width:auto}
    .maincol{margin-left:0;padding:20px 16px 90px}
    #prevBtn{left:8px}#nextBtn{right:8px}
  }
</style>
</head>
<body>
<div class="storylayout">
  <aside class="sidebar">
    <div class="railhint"><span class="rh-ic">☰</span><span class="rh-txt">Menu</span></div>
    <div class="langtog">
      <button id="btn-ru" onclick="setLang('ru')">RU</button>
      <button id="btn-en" class="on" onclick="setLang('en')">EN</button>
    </div>
    <span class="kicker" id="kicker"></span>
    <h1 class="story-title" id="mainTitle"></h1>
    <nav class="chapnav" id="chapnav"></nav>
    <div class="stepbar">
      <span class="chapLabel" id="chapLabel"></span>
      <div class="chapprog-track"><span id="chapProg"></span></div>
      <span class="stepcount" id="stepCount"></span>
    </div>
  </aside>
  <main class="maincol">
    <div class="stage" id="stage"></div>
  </main>
</div>
<button class="navbtn" id="prevBtn" onclick="go(-1)" aria-label="prev">←</button>
<button class="navbtn" id="nextBtn" onclick="go(1)" aria-label="next">→</button>
<script>
var LANG='en';
function tr(o){return o[LANG];}
const UI={

function answerQuiz(i,choice){
  const row=document.querySelector('.qrow[data-i="'+i+'"]');
  if(!row||row.classList.contains('answered'))return;
  const correct=row.dataset.a;
  const btns=row.querySelectorAll('.qbtn');
  btns.forEach((b,idx)=>{if((correct==='brain'&&idx===0)||(correct==='search'&&idx===1))b.classList.add('correct');});
  const clickedCorrect=(choice===correct);
  if(!clickedCorrect){btns.forEach((b,idx)=>{if((choice==='brain'&&idx===0)||(choice==='search'&&idx===1))b.classList.add('wrong');});}
  row.classList.add('answered');
  window.__quiz.answered++;
  if(clickedCorrect)window.__quiz.score++;
  const s=window.__quiz;
  const done=tr({ru:" — готово",en:" — done"}),perfect=tr({ru:" — идеально! 🎉",en:" — perfect! 🎉"}),scoreLbl=tr({ru:"Счёт: ",en:"Score: "});
  const el=document.getElementById('quizScore');
  if(el)el.textContent=scoreLbl+s.score+' / '+s.total+(s.answered===s.total?(s.score===s.total?perfect:done):'');
}

function updateRot(v){

  else if(v<75)msg=tr({ru:'🟡 '+v+'% — прошли 50%: начало чата начинает забываться.',en:'🟡 '+v+'% — past 50%: the start of the chat starts to fade.'});
  else msg=tr({ru:'🔴 '+v+'% — сильный context rot: качество может упасть ~на 50%. Пора начать новый чат.',en:'🔴 '+v+'% — heavy context rot: quality can drop ~50%. Time to start a new chat.'});
  const el=document.getElementById('rotOut');if(el)el.textContent=msg;
}

      {ic:'📣',n:'Marketing Strategy',d:'Превращает маркетинговые запросы в рабочие брифы, черновики и обзоры: стратегия, контент и анализ сигналов в одном процессе.',tools:['Adobe Acrobat','Adobe Express','Adobe Photoshop','Amplitude','Canva','Figma','Gmail','Google Calendar','Google Drive','HubSpot','Mailchimp','Notion','Outlook Calendar','Outlook Email','Slack','Teams'],caps:['Собрать рабочий стратегический бриф','Готовить и улучшать контент','Сводить сигналы рынка и кампаний']}
    ]},
    en:{pick:'Pick a ready agent template — what it can do and what it works with:',works:'Works with',caps:'Capabilities',
    tpls:[
      {ic:'📨',n:'Customer Reply Drafter',d:'A support-reply workflow: pulls context from your ticket, account and knowledge apps, and drafts a customer-ready reply plus internal notes.',tools:['Asana','Atlassian Rovo','Box','ClickUp','Dropbox','Gmail','Google Drive','HubSpot','Intercom','Linear','Notion','Outlook Email','Slack','Teams'],caps:['Pull ticket and account context from apps or uploads','Draft a customer-ready support reply','Write internal handling notes']},
      {ic:'💼',n:'Sales Assistant',d:'Generalized sales workflows: account intelligence, competitive research, meeting prep, follow-up and pipeline planning.',tools:['Gmail','Google Calendar','Google Drive','HubSpot','Notion','Outlook Calendar','Outlook Email','Slack','Teams'],caps:['Monitor account signals and recent changes','Build a competitive intelligence brief','Create a tailored sales asset']},
      {ic:'📊',n:'Data Analysis',d:'A data-analysis workflow around the life of an analysis: sharpen the question, write SQL, inspect the data, build visuals and run a quality pass.',tools:['Airtable','Amplitude','Asana','Atlassian Rovo','Google Drive','Hex','Linear'],caps:['Turn a vague data ask into an analysis plan','Prototype a focused dashboard','Choose the clearest chart or table']},
      {ic:'🧭',n:'Chief of Staff',d:'Prepare a high-signal operating brief from your schedule, inbox and team-chat: priorities, meeting prep, TODOs and follow-ups.',tools:['Gmail','Google Calendar','Outlook Calendar','Outlook Email','Slack','Teams'],caps:['Prepare an operating brief from schedule, inbox and team chat','Format a scan-friendly brief with TODOs and source links']},
      {ic:'📣',n:'Marketing Strategy',d:'Turn marketing asks into working briefs, stronger drafts and clearer reviews: strategy, content and signal synthesis in one workflow.',tools:['Adobe Acrobat','Adobe Express','Adobe Photoshop','Amplitude','Canva','Figma','Gmail','Google Calendar','Google Drive','HubSpot','Mailchimp','Notion','Outlook Calendar','Outlook Email','Slack','Teams'],caps:['Build a working strategy brief','Draft and improve content','Synthesize market and campaign signals']}
    ]}});
  window.__tpls=L;
  var btns=L.tpls.map(function(t,i){return '<button class="tplbtn'+(i===0?' on':'')+'" id="tpl-'+i+'" onclick="selectTpl('+i+')">'+t.ic+' '+t.n+'</button>';}).join('');
  return '<div class="subhead">'+L.pick+'</div><div class="tplrow">'+btns+'</div><div id="tpl-card">'+tplCardHTML(0)+'</div>';
}
function tplCardHTML(i){
  var L=window.__tpls,t=L.tpls[i];
  var chips=t.tools.map(function(x){return '<span class="pill">'+x+'</span>';}).join(' ');
  var caps=t.caps.map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="agentcard"><div style="display:flex;align-items:center;gap:14px;margin-bottom:12px"><div class="tplvis">'+t.ic+'</div><div><div style="font-weight:800;font-size:19px">'+t.n+'</div><div style="color:var(--muted);font-size:14.5px">'+t.d+'</div></div></div>'
    +'<div style="margin:12px 0 8px"><b>'+L.works+':</b></div><div style="margin-bottom:6px;line-height:2.2">'+chips+'</div>'
    +'<div style="margin:14px 0 4px"><b>'+L.caps+':</b></div><ul class="clean" style="margin:0">'+caps+'</ul></div>';
}
function selectTpl(i){
  document.querySelectorAll('.tplbtn').forEach(b=>b.classList.remove('on'));
  const b=document.getElementById('tpl-'+i);if(b)b.classList.add('on');
  const c=document.getElementById('tpl-card');if(c)c.innerHTML=tplCardHTML(i);
}
function vibeWhatWidget(){
  const intro=tr({ru:'<div class="note">Вайбкодинг — это когда ты создаёшь программу, описывая словами, что нужно, а ИИ пишет код за тебя. Фокус на идее и результате, а не на синтаксисе.</div>',
    en:'<div class="note">Vibe coding is when you build software by describing what you want in plain words, and the AI writes the code. You focus on the idea and the result, not the syntax.</div>'});
  const plabel=tr({ru:'Пример промпта:',en:'Example prompt:'});
  const olabel=tr({ru:'Что генерит ИИ:',en:'What the AI writes:'});
  const prompt=tr({ru:'«Сделай HTML-кнопку: по клику показывает случайную мотивационную цитату.»',en:'"Make an HTML button: on click it shows a random motivational quote."'});
  const code='&lt;button onclick="quote()"&gt;💡 Quote&lt;/button&gt;\n&lt;script&gt;\nfunction quote(){\n  const list=["Start now","Less talk, more action","Fail faster"];\n  alert(list[Math.floor(Math.random()*list.length)]);\n}\n&lt;/script&gt;';
  return intro+'<div class="subhead">'+plabel+'</div><div class="promptbubble">🧑‍💻 '+prompt+'</div>'
    +'<div class="subhead">'+olabel+'</div><pre class="codeblk">'+code+'</pre>';
}

function updateAgent(){
  const L=window.__blabels;if(!L)return;
  const g=document.getElementById('b-goal'),m=document.getElementById('b-model');if(!g||!m)return;
  const boxes=[...document.querySelectorAll('#b-tools input')];
  const chosen=boxes.filter(x=>x.checked).map(x=>+x.value);
  const toolsStr=chosen.length?chosen.map(i=>L.toolNames[i]).join(', '):'—';
  const mcpIdx=[2,3,5];
  const mcpNeeded=chosen.filter(i=>mcpIdx.indexOf(i)>-1).map(i=>L.toolNames[i]);
  const mcpLine=mcpNeeded.length?(L.mcp+': '+mcpNeeded.join(', ')):L.none;
  const el=document.getElementById('b-card');
  if(el)el.innerHTML='<b>'+L.role+':</b> '+g.value+' ('+m.value+')<br><b>'+L.tools+':</b> '+toolsStr+'<br><b>'+L.loop+':</b> '+L.loopTxt+'<br><b>MCP:</b> '+mcpLine;
}
function multiAgentWidget(){
  const L=tr({ru:{lead:'Сложную задачу делят между агентами: «оркестратор» раздаёт работу, специалисты выполняют и передают результат дальше по цепочке.',scenario:'Сценарий',play:'▶ Запустить',
      scen:[{name:'Ресёрч-отчёт',nodes:[{n:'Оркестратор',d:'Раздаёт задачи'},{n:'Поисковик',d:'Собирает источники'},{n:'Аналитик',d:'Сводит факты'},{n:'Критик',d:'Проверяет'},{n:'Писатель',d:'Пишет отчёт'}]},
        {name:'Разработка фичи',nodes:[{n:'Планировщик',d:'Делит на шаги'},{n:'Кодер',d:'Пишет код'},{n:'Тестировщик',d:'Проверяет работу'},{n:'Ревью безопасности',d:'Ищет уязвимости'}]},
        {name:'Разбор почты',nodes:[{n:'Классификатор',d:'Сортирует письма'},{n:'Черновик ответа',d:'Готовит ответ'},{n:'Календарь',d:'Ставит встречи'},{n:'Человек',d:'Эскалация сложного'}]}]},
    en:{lead:'A hard task is split between agents: an "orchestrator" hands out work, specialists do their part and pass the result down the chain.',scenario:'Scenario',play:'▶ Run',
      scen:[{name:'Research report',nodes:[{n:'Orchestrator',d:'Hands out tasks'},{n:'Searcher',d:'Gathers sources'},{n:'Analyst',d:'Combines facts'},{n:'Checker',d:'Verifies'},{n:'Writer',d:'Writes the report'}]},
        {name:'Build a feature',nodes:[{n:'Planner',d:'Splits into steps'},{n:'Coder',d:'Writes code'},{n:'Tester',d:'Checks it works'},{n:'Security review',d:'Looks for holes'}]},
        {name:'Inbox triage',nodes:[{n:'Classifier',d:'Sorts emails'},{n:'Draft reply',d:'Prepares an answer'},{n:'Calendar',d:'Sets meetings'},{n:'Human',d:'Handles hard cases'}]}]}});
  window.__ma=L;window.__maIdx=0;
  const opts=L.scen.map((sc,i)=>'<option value="'+i+'">'+sc.name+'</option>').join('');
  return '<div class="note">'+L.lead+'</div>'
    +'<div class="bldr"><div><label>'+L.scenario+'</label><select id="ma-sel" onchange="maSelect(this.value)">'+opts+'</select></div></div>'
    +'<div id="ma-flow">'+maFlowHTML(0)+'</div>'
    +'<button class="btn" onclick="maPlay()">'+L.play+'</button>'
    +'<div class="axis-out" id="ma-out" style="margin-top:12px">—</div>';
}
function maFlowHTML(i){
  const sc=window.__ma.scen[i];let h='<div class="maflow">';
  sc.nodes.forEach((nd,k)=>{h+='<div class="manode" id="ma-n-'+k+'"><b>'+nd.n+'</b><span style="color:var(--muted);font-size:11.5px">'+nd.d+'</span></div>';if(k<sc.nodes.length-1)h+='<span class="maarrow">→</span>';});
  return h+'</div>';
}
function maSelect(i){window.__maIdx=+i;const f=document.getElementById('ma-flow');if(f)f.innerHTML=maFlowHTML(+i);const o=document.getElementById('ma-out');if(o)o.textContent='—';}
function maPlay(){
  const sc=window.__ma.scen[window.__maIdx];const out=document.getElementById('ma-out');
  sc.nodes.forEach((nd,k)=>{setTimeout(()=>{document.querySelectorAll('.manode').forEach(n=>n.classList.remove('on'));const node=document.getElementById('ma-n-'+k);if(node)node.classList.add('on');if(out)out.innerHTML='<b>'+nd.n+':</b> '+nd.d;},k*900);});
}

const CHAPTERS=[
  {key:'ctx',name:UI.fCtx,col:'#4f7cff'},{key:'know',name:UI.fKnow,col:'#ffc64b'},{key:'tools',name:UI.fTools,col:'#22c3a6'},{key:'vibe',name:UI.fVibe,col:'#a78bfa'},{key:'agents',name:UI.fAgents,col:'#ff8a5c'},{key:'about',name:UI.fAbout,col:'#9aa7c2'}
];
function buildSteps(){var out=[];CHAPTERS.forEach((ch,ci)=>{CARDS.filter(c=>c.theme===ch.key).forEach(c=>out.push({card:c,ch:ci}));});return out;}
var STEPS=buildSteps();var CUR=0;
function chapterBounds(ci){var first=STEPS.findIndex(x=>x.ch===ci);var count=STEPS.filter(x=>x.ch===ci).length;return {first:first,count:count};}
function renderNav(){
  document.getElementById('chapnav').innerHTML=CHAPTERS.map((ch,i)=>'<button class="chapbtn'+((STEPS[CUR]&&STEPS[CUR].ch===i)?' on':'')+'" onclick="jumpChapter('+i+')"><span class="cdot" style="background:'+ch.col+'"></span>'+(i+1)+'. '+tr(ch.name)+'</button>').join('');
}
function renderStep(dir){
  var st=STEPS[CUR],c=st.card,ch=CHAPTERS[st.ch],b=chapterBounds(st.ch),local=CUR-b.first+1;
  document.getElementById('chapLabel').textContent=(st.ch+1)+'. '+tr(ch.name);
  document.getElementById('stepCount').textContent=local+' / '+b.count;
  var pr=document.getElementById('chapProg');pr.style.width=(local/b.count*100)+'%';pr.style.background=ch.col;
  var stage=document.getElementById('stage');
  stage.innerHTML='<div class="panel"><div class="p-head"><div class="p-badge" style="color:'+ch.col+';border-color:'+ch.col+'">'+c.icon+'</div><div><div class="p-eyebrow">'+tr(UI.topic)+' '+(CUR+1)+' / '+STEPS.length+'</div><h2 class="p-title">'+tr(c.title)+'</h2></div></div><div class="p-body">'+c.render()+'</div></div>';
  if(stage.firstChild)stage.firstChild.classList.add(dir==='prev'?'in-left':'in-right');
  renderNav();
  document.getElementById('prevBtn').disabled=(CUR===0);
  document.getElementById('nextBtn').disabled=(CUR===STEPS.length-1);
}
function go(d){var n=CUR+d;if(n<0||n>=STEPS.length)return;CUR=n;renderStep(d<0?'prev':'next');window.scrollTo({top:0,behavior:'smooth'});}
function jumpChapter(ci){var b=chapterBounds(ci);if(b.first<0)return;var dir=b.first<CUR?'prev':'next';CUR=b.first;renderStep(dir);window.scrollTo({top:0,behavior:'smooth'});}
function renderChromeStory(){
  document.getElementById('kicker').textContent=tr(UI.kicker);
  document.getElementById('mainTitle').textContent=tr({ru:'AI Summit — сторителлинг',en:'AI Summit — story'});
  document.documentElement.lang=LANG;
  renderNav();renderStep('next');
}
function setLang(l){if(l===LANG)return;LANG=l;document.getElementById('btn-ru').classList.toggle('on',l==='ru');document.getElementById('btn-en').classList.toggle('on',l==='en');STEPS=buildSteps();CUR=0;renderChromeStory();}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);else if(e.key==='ArrowLeft')go(-1);});
renderChromeStory();
</script>
